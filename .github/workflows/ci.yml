name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-c:
    name: Build (C Strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile agent_bridge.c (C11, all warnings as errors)
        run: |
          gcc -c -std=c11 -Wall -Wextra -Werror -pedantic \
            -I firmware \
            firmware/agent_bridge.c \
            -o /tmp/agent_bridge.o

      - name: Compile devices/relay.c
        run: |
          gcc -c -std=c11 -Wall -Wextra -Werror -pedantic \
            -I firmware \
            firmware/devices/relay.c \
            -o /tmp/relay.o

      - name: Compile transport/transport_serial.c (skip on host, platform-specific)
        run: |
          echo "transport_serial.c requires UART hardware — skipped in host CI"

      - name: Link test
        run: |
          echo "All compilation units OK"

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build-c
    steps:
      - uses: actions/checkout@v4

      - name: Compile and run smoke test
        run: |
          cat > /tmp/test_ab.c << 'TESTEOF'
          #include <stdio.h>
          #include <string.h>
          #include <assert.h>
          #include "agent_bridge.h"

          static int test_on(void *ctx, bool on) { return 0; }
          static int test_get_state(void *ctx, char *buf, size_t len) {
              return snprintf(buf, len, "{\"power\":true}");
          }
          static int test_set_level(void *ctx, uint8_t pct) { return 0; }

          int main(void) {
              /* 1. init */
              agent_bridge_t *ab = agent_bridge_init(NULL);
              assert(ab != NULL);

              /* 2. register device */
              agent_device_t dev = {
                  .name = "test_light",
                  .display_name = "Test Light",
                  .description = "A test device",
                  .caps = (agent_capability_t)(AB_CAP_ON_OFF | AB_CAP_LEVEL),
                  .ops = {
                      .on = test_on,
                      .get_state = test_get_state,
                      .set_level = test_set_level,
                  },
              };
              assert(agent_bridge_register_device(ab, &dev) == 0);

              /* 3. duplicate name → should fail */
              agent_device_t dev2 = dev;
              assert(agent_bridge_register_device(ab, &dev2) == -1);

              /* 4. dispatch tool call: set_power */
              char result[256];
              int n = agent_bridge_dispatch_tool(ab,
                  "test_light.set_power", "{\"power\":true}",
                  result, sizeof(result));
              assert(n > 0);
              assert(strstr(result, "power") != NULL);
              printf("  set_power result: %s\n", result);

              /* 5. dispatch: set_level */
              n = agent_bridge_dispatch_tool(ab,
                  "test_light.set_level", "{\"level\":75}",
                  result, sizeof(result));
              assert(n > 0);
              assert(strstr(result, "level") != NULL);
              printf("  set_level result: %s\n", result);

              /* 6. dispatch: get_state */
              n = agent_bridge_dispatch_tool(ab,
                  "test_light.get_state", "{}",
                  result, sizeof(result));
              assert(n > 0);
              assert(strstr(result, "power") != NULL);
              printf("  get_state result: %s\n", result);

              /* 7. dispatch: unknown device → error */
              n = agent_bridge_dispatch_tool(ab,
                  "nonexistent.set_power", "{}",
                  result, sizeof(result));
              assert(strstr(result, "not found") != NULL);

              /* 8. tools JSON */
              char tools[1024];
              n = agent_bridge_get_tools_json(ab, tools, sizeof(tools));
              assert(n > 0);
              assert(strstr(tools, "test_light") != NULL);
              printf("  tools: %.200s...\n", tools);

              /* 9. device list JSON */
              char devlist[512];
              n = agent_bridge_get_device_list_json(ab, devlist, sizeof(devlist));
              assert(n > 0);
              assert(strstr(devlist, "test_light") != NULL);

              /* 10. unregister */
              assert(agent_bridge_unregister_device(ab, "test_light") == 0);
              assert(agent_bridge_unregister_device(ab, "test_light") == -1);

              /* 11. deinit */
              agent_bridge_deinit(ab);

              printf("\nAll %d tests passed\n", 11);
              return 0;
          }
          TESTEOF

          gcc -std=c11 -Wall -Wextra -Werror -I firmware \
            /tmp/test_ab.c firmware/agent_bridge.c \
            -o /tmp/test_ab
          /tmp/test_ab

  check-header:
    name: Header Self-Sufficiency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check agent_bridge.h includes everything it needs
        run: |
          cat > /tmp/check_header.c << 'EOF'
          #include "agent_bridge.h"
          int main(void) { return 0; }
          EOF
          gcc -std=c11 -Wall -Werror -I firmware \
            /tmp/check_header.c -o /tmp/check_header
          /tmp/check_header

  check-style:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Basic style checks
        run: |
          echo "=== Tab check ==="
          ! grep -rP '\t' firmware/agent_bridge.c firmware/agent_bridge.h \
            firmware/devices/relay.c firmware/devices/relay.h \
            firmware/transport/transport_serial.c firmware/transport/transport_serial.h \
            && echo "No tabs found" || echo "WARNING: tabs found"

          echo "=== Trailing whitespace ==="
          ! grep -rP ' $' firmware/agent_bridge.c firmware/agent_bridge.h \
            && echo "No trailing spaces" || echo "WARNING: trailing spaces found"

          echo "=== Line length (soft limit 120) ==="
          LONG=$(awk 'length>120' firmware/agent_bridge.c firmware/agent_bridge.h | wc -l)
          echo "$LONG lines >120 chars"
